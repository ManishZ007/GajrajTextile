<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome to Gajraj Paithani</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background-color: #000000;
      font-family: Arial, Helvetica, sans-serif;
    "
  >
    <table
      role="presentation"
      width="100%"
      cellpadding="0"
      cellspacing="0"
      style="background-color: #000000"
    >
      <tr>
        <td align="center" style="padding: 40px 16px">
          <table
            role="presentation"
            width="560"
            cellpadding="0"
            cellspacing="0"
            style="background-color: #111111"
          >
            <tr>
              <td align="center" style="padding: 48px 40px 32px">
                <h1
                  style="
                    margin: 0;
                    font-family: Georgia, serif;
                    font-size: 22px;
                    font-weight: 700;
                    color: #ffffff;
                    letter-spacing: 2px;
                  "
                >
                  GAJRAJ PAITHANI
                </h1>
              </td>
            </tr>

            <tr>
              <td style="padding: 0 40px">
                <div style="height: 1px; background-color: #2a2a2a"></div>
              </td>
            </tr>

            <tr>
              <td style="padding: 40px 40px 32px">
                <h2
                  style="
                    margin: 0 0 16px;
                    font-size: 28px;
                    font-weight: 700;
                    color: #ffffff;
                  "
                >
                  Welcome, {{name}}.
                </h2>
                <p
                  style="
                    margin: 0;
                    font-size: 15px;
                    line-height: 1.7;
                    color: #888888;
                  "
                >
                  You're now part of a tradition that's been handwoven for
                  generations. Every thread tells a story — and yours just
                  began.
                </p>
              </td>
            </tr>

            <tr>
              <td style="padding: 0 40px 48px">
                <a
                  href="https://gajrajpaithani.com/collections"
                  style="
                    display: inline-block;
                    padding: 14px 36px;
                    background-color: #ffffff;
                    color: #000000;
                    font-size: 14px;
                    font-weight: 700;
                    text-decoration: none;
                    letter-spacing: 1px;
                  "
                >
                  SHOP NOW
                </a>
              </td>
            </tr>

            <tr>
              <td style="padding: 0 40px">
                <div style="height: 1px; background-color: #2a2a2a"></div>
              </td>
            </tr>

            <tr>
              <td align="center" style="padding: 32px 40px">
                <p
                  style="
                    margin: 0;
                    font-size: 12px;
                    color: #555555;
                    line-height: 1.6;
                  "
                >
                  Gajraj Paithani · Yeola, Nashik · Maharashtra, India
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
