spring.application.name=authentication
server.port=8081

# ============================================
# Database
# ============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/gajraj_paithani_auth
spring.datasource.username=postgres
spring.datasource.password=root



# ============================================
# Hibernate / JPA
# ============================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# ============================================
# Security Config
# ============================================
server.servlet.session.cookie.same-site=STRICT
spring.main.web-application-type=servlet
spring.security.user.name=""
spring.security.user.password=""


# ============================================
# JWT Keys and Ex
# ============================================
jwt.private-key=classpath:keystore/private.pem
jwt.public-key=classpath:keystore/public.pem
jwt.expiration=900000


# ============================================
# OAuth providers
# ============================================
# Google: same client-id used by the frontend; verifier checks the token's audience matches.
oauth.google.client-id=433605740579-1c4thl3pirq5nqrbaj9tti7msqnqptfm.apps.googleusercontent.com
# Facebook: app id + secret are needed for /debug_token to confirm the access_token belongs to this app.
oauth.facebook.app-id=${FACEBOOK_APP_ID:}
oauth.facebook.app-secret=${FACEBOOK_APP_SECRET:}


# ============================================
# RabbitMQ configuration
# ============================================
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest



